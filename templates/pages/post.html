{% extends 'layout.html' %} {% block content %}
<div class="flex flex-col w-full">
  <h1 class="text-5xl font-bold text-center">{{post.title}}</h1>
  <h3 class="text-xl text-center">{{post.description}}</h3>
</div>
<div class="w-full">
  <p>{{post.content}}</p>
</div>
<div class="w-full text-right">
  {% if post.updated %}
  <p>updated: {{post.updated}}</p>
  {% else %}
  <p>added: {{post.added}}</p>
  {% endif %}
</div>
{% endblock content %}
