{% extends 'layout.html' %} {% block content %}
<div>
  <h1>Dashboard</h1>
  <nav>
    <ul class="flex gap-2">
      <li><a href="{{url_for('add_post')}}">Add New Post</a></li>
    </ul>
  </nav>
</div>
<div class="flex gap-2">
  {% if posts %} {% for post in posts %}
  <div class="border rounded-2xl">
    <form method="post" class="flex flex-col">
      <input type="hidden" name="id" value="{{post.id}}" />
      <input type="text" name="title" id="title" />
      <input type="text" name="description" id="description" />
      <input type="text" name="content" id="content" />
      <button formaction="/update_post" formmethod="post">update post</button>
      <button formaction="/delete_post" formmethod="post">delete post</button>
    </form>
  </div>
  {% endfor %} {% else %}
  <div>
    <p>No posts, please add posts first!</p>
  </div>
  {% endif %}
</div>
{% endblock content %}
