{% extends 'layout.html' %} {% block content %}
<div class="w-full text-center">
  <h1>Dashboard</h1>
  <nav>
    <ul class="flex gap-2">
      <li><a href="{{url_for('add_post')}}">Add New Post</a></li>
    </ul>
  </nav>
</div>
<div class="flex gap-2">
  {% if posts %} {% for post in posts %}
  <div class="flex border rounded-2xl w-full justify-center items-center">
    <form method="post" class="flex justify-between w-full p-2 items-center">
      <input type="hidden" name="id" value="{{post.id}}" />
      <h1>Title: {{post.title}}</h1>
      <div class="flex flex-col gap-2">
        <button
          formaction="{{url_for('edit_post', _id=post.id)}}"
          formmethod="post"
          value="{{post.id}}"
        >
          Update Post
        </button>
        <button formaction="/delete_post" formmethod="post" value="{{post.id}}">
          Delete Post
        </button>
      </div>
    </form>
  </div>
  {% endfor %} {% else %}
  <div>
    <p>No posts, please add posts first!</p>
  </div>
  {% endif %}
</div>
{% endblock content %}
